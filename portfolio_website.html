<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <title>Proud — PM/PO · Manual QA · UX Designer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    (() => {
      try {
        const saved = localStorage.getItem('portfolio-theme');
        const theme = saved === 'light' || saved === 'dark' ? saved : 'dark';
        document.documentElement.dataset.theme = theme;
      } catch(e) {
        document.documentElement.dataset.theme = 'dark';
      }
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #070711;
      --s1:       #0f0e1b;
      --s2:       #151422;
      --s3:       #1b1a2b;
      --s4:       #242236;
      --accent:   #9b93c7;
      --accent2:  #7f8ab4;
      --accent3:  #b8b1d6;
      --glow:     rgba(155,147,199,0.12);
      --glow2:    rgba(127,138,180,0.08);
      --text:     #e7e3f2;
      --text2:    #c7c1dc;
      --muted:    #8a849f;
      --muted2:   #5f5a73;
      --border:   #242232;
      --border2:  #343149;
      --nav-bg: rgba(7,7,17,0.76);
      --nav-bg-scrolled: rgba(7,7,17,0.94);
      --glass-bg: rgba(21,20,34,0.72);
      --modal-backdrop: rgba(7,7,17,0.76);
      --media-bg: #080812;
      --media-bg2: #05050c;
      --button-fg: #070711;
      --shadow-soft: rgba(0,0,0,0.46);
      --ff: 'Inter', sans-serif;
      --ffd: 'Space Grotesk', sans-serif;
    }
    html[data-theme="light"] {
      color-scheme: light;
      --bg:       #f6f3ee;
      --s1:       #fffcf7;
      --s2:       #f1ede6;
      --s3:       #e7e1d9;
      --s4:       #dcd4cc;
      --accent:   #7d739f;
      --accent2:  #697896;
      --accent3:  #5f5677;
      --glow:     rgba(125,115,159,0.11);
      --glow2:    rgba(105,120,150,0.08);
      --text:     #25222d;
      --text2:    #4d465f;
      --muted:    #746e80;
      --muted2:   #9a938f;
      --border:   #e3dcd3;
      --border2:  #cfc5bb;
      --nav-bg: rgba(255,252,247,0.78);
      --nav-bg-scrolled: rgba(255,252,247,0.95);
      --glass-bg: rgba(255,252,247,0.72);
      --modal-backdrop: rgba(37,34,45,0.32);
      --media-bg: #eee9e2;
      --media-bg2: #f8f4ee;
      --button-fg: #fffaf3;
      --shadow-soft: rgba(75,65,55,0.16);
    }
    html { scroll-behavior: smooth; color-scheme: dark; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--ff); font-size: 15px; line-height: 1.6;
      overflow-x: hidden;
      transition: background 0.25s ease, color 0.25s ease;
    }
    section { scroll-margin-top: 84px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* -- NAV -- */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 52px; height: 62px;
      background: var(--nav-bg); backdrop-filter: blur(20px) saturate(1.15);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }
    nav.scrolled { background: var(--nav-bg-scrolled); }
    .nav-logo {
      font-family: var(--ffd); font-weight: 700; font-size: 1.15rem;
      color: var(--text); letter-spacing: -0.3px;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 34px; list-style: none; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.82rem;
      font-weight: 500; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text2); }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .theme-toggle {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border2); background: var(--glass-bg);
      color: var(--text2); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: transform 0.2s, border-color 0.2s, color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .theme-toggle:hover {
      color: var(--accent); border-color: var(--accent);
      box-shadow: 0 0 14px var(--glow);
      transform: translateY(-1px);
    }
    .theme-toggle svg { width: 16px; height: 16px; display: block; }
    .theme-toggle .theme-icon-moon { display: none; }
    .theme-toggle .theme-icon-sun { display: block; }
    html[data-theme="light"] .theme-toggle .theme-icon-moon { display: block; }
    html[data-theme="light"] .theme-toggle .theme-icon-sun { display: none; }
    .nav-cta {
      display: flex; align-items: center; gap: 7px; padding: 8px 18px;
      border-radius: 8px; font-size: 0.8rem; font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: var(--button-fg); text-decoration: none; transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 0 18px rgba(155,147,199,0.18);
    }
    .nav-cta:hover { opacity: 0.9; transform: translateY(-1px); }

    /* -- HERO -- */
    #hero {
      min-height: 100vh; display: flex; align-items: center;
      padding: 100px 52px 80px; position: relative; overflow: hidden;
    }
    #hero-canvas {
      position: absolute; inset: 0; z-index: 0; opacity: 0.7;
      pointer-events: none;
    }
    .hero-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: radial-gradient(ellipse 60% 60% at 70% 40%, rgba(127,138,180,0.055) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 40% at 20% 70%, rgba(155,147,199,0.045) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-inner { position: relative; z-index: 2; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--border2); border-radius: 100px;
      padding: 5px 14px; font-size: 0.73rem; color: var(--muted);
      margin-bottom: 32px; background: var(--glass-bg);
      backdrop-filter: blur(8px);
    }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
      animation: blink 2.2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;box-shadow:0 0 8px var(--accent)}50%{opacity:0.3;box-shadow:none} }

    .hero-name {
      font-family: var(--ffd); font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 700; line-height: 1.05; letter-spacing: -2px; margin-bottom: 14px;
    }
    .hero-name .hi { color: var(--muted); font-weight: 300; }
    .hero-name .nm { color: var(--text); }
    .hero-name .ac {
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .hero-roles { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
    .role-chip {
      display: flex; align-items: center; gap: 6px; padding: 6px 14px;
      border-radius: 100px; border: 1px solid var(--border2);
      font-size: 0.78rem; font-weight: 500; color: var(--text2);
      background: var(--glass-bg); backdrop-filter: blur(6px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .role-chip:hover {
      border-color: var(--accent); box-shadow: 0 0 10px rgba(155,147,199,0.14);
    }
    .role-chip svg { color: var(--accent); flex-shrink: 0; }

    .hero-desc {
      max-width: 540px; color: var(--muted); font-size: 0.95rem; line-height: 1.62; margin-bottom: 36px;
    }
    .hero-desc strong { color: var(--text2); font-weight: 500; }
    .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 7px; padding: 12px 24px;
      border-radius: 8px; font-family: var(--ff); font-weight: 600; font-size: 0.85rem;
      cursor: pointer; text-decoration: none; transition: all 0.2s; border: none;
      position: relative; overflow: hidden;
    }
    .btn svg, .proj-link svg, .clink-icon svg { flex-shrink: 0; overflow: visible; }
    .hero-ctas .btn svg { transition: transform 0.24s cubic-bezier(.22,1,.36,1); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: var(--button-fg); box-shadow: 0 0 22px rgba(155,147,199,0.22);
    }
    .hero-ctas .btn-primary::before {
      content: ''; position: absolute; inset: -60% auto -60% -35%;
      width: 34%; transform: rotate(18deg) translateX(-120%);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.34), transparent);
      transition: transform 0.55s cubic-bezier(.22,1,.36,1);
      pointer-events: none;
    }
    .btn-primary:hover {
      transform: translateY(-3px) scale(1.015);
      box-shadow: 0 14px 34px rgba(155,147,199,0.28), 0 0 26px rgba(155,147,199,0.24);
      filter: brightness(1.04);
    }
    .hero-ctas .btn-primary:hover::before { transform: rotate(18deg) translateX(430%); }
    .hero-ctas .btn-primary:hover svg { transform: translateX(2px) scale(1.06); }
    .btn-ghost {
      background: transparent; color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); box-shadow: 0 0 10px rgba(155,147,199,0.12); }

    .hero-stats {
      display: flex; gap: 48px; margin-top: 60px; padding-top: 48px;
      border-top: 1px solid var(--border); flex-wrap: wrap;
    }
    .stat-num {
      font-family: var(--ffd); font-size: 2rem; font-weight: 700; line-height: 1;
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-label { font-size: 0.73rem; color: var(--muted); margin-top: 4px; }

    /* -- SECTIONS -- */
    section { padding: 96px 52px; }
    .stag {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
    }
    .stag::before { content: ''; width: 24px; height: 1px; background: linear-gradient(90deg, var(--accent), transparent); }
    .sh {
      font-family: var(--ffd); font-size: clamp(1.9rem, 3.5vw, 2.8rem);
      font-weight: 700; letter-spacing: -1px; line-height: 1.1; margin-bottom: 16px;
    }
    .ssub { color: var(--muted); font-size: 0.92rem; max-width: 460px; line-height: 1.62; margin-bottom: 48px; }

    /* -- ABOUT -- */
    #about { background: var(--s1); position: relative; overflow: hidden; padding: 0; }
    .about-grid {
      display: grid; grid-template-columns: minmax(0, 58%) minmax(390px, 42%);
      min-height: 760px; position: relative; z-index: 2;
    }
    .about-body {
      display: flex; flex-direction: column; justify-content: center;
      padding: 56px clamp(44px, 4vw, 72px) 48px clamp(52px, 5vw, 82px);
    }
    .about-body .stag { margin-bottom: clamp(62px, 8vh, 92px); }
    .about-body .sh { max-width: 700px; font-size: clamp(2.35rem, 3.8vw, 3.7rem); line-height: 1.04; margin-bottom: 24px; }
    .about-body p { color: var(--muted); line-height: 1.68; margin-bottom: 16px; font-size: 0.94rem; max-width: 680px; }
    .about-body p strong { color: var(--text2); font-weight: 500; }
    .about-edu {
      margin-top: 28px; padding: 20px 22px;
      background: var(--s2); border: 1px solid var(--border2); border-radius: 12px;
      display: flex; gap: 14px; align-items: flex-start;
      box-shadow: inset 0 1px 0 rgba(155,147,199,0.06);
    }
    .about-edu-icon { color: var(--accent); flex-shrink: 0; margin-top: 2px; }
    .about-edu-deg { font-weight: 600; font-size: 0.88rem; margin-bottom: 3px; color: var(--text); }
    .about-edu-inst { font-size: 0.8rem; color: var(--muted); }
    .about-edu-year { font-size: 0.73rem; color: var(--accent); margin-top: 5px; }

    .about-side { position: relative; min-width: 0; min-height: 760px; }
    .about-portrait-stage {
      position: absolute; inset: 0; overflow: hidden;
      background: var(--s2);
    }
    .about-portrait-stage::before {
      content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(90deg, var(--s1) 0%, transparent 9%);
    }
    .about-portrait {
      width: 100%; height: 100%; display: block;
      object-fit: cover; object-position: left center;
    }
    .role-cards {
      position: relative; z-index: 2; width: 100%; margin-top: 22px;
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px;
    }
    .role-card {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      padding: 16px 18px; transition: all 0.3s; cursor: default;
      position: relative; overflow: hidden;
    }
    .role-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .role-card:hover { border-color: var(--border2); box-shadow: 0 0 24px rgba(155,147,199,0.06); transform: translateY(-2px); }
    .role-card:hover::before { opacity: 1; }
    .role-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .role-card-icon { color: var(--accent); }
    .role-card-title { font-weight: 600; font-size: 0.84rem; color: var(--text); }
    .role-card-desc { font-size: 0.77rem; color: var(--muted); line-height: 1.5; }

    /* -- EXPERIENCE -- */
    #experience { background: var(--bg); }
    .exp-list { max-width: 840px; position: relative; }
    .exp-item {
      display: grid; grid-template-columns: 132px 58px minmax(0,1fr);
      gap: 0 22px; margin-bottom: 48px; position: relative; --avatar-center: 183px;
    }
    .exp-item:not(:last-child)::after {
      content: ''; position: absolute; left: var(--avatar-center); top: 66px; bottom: -32px;
      width: 1px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 46%, var(--border2)), color-mix(in srgb, var(--accent) 10%, transparent));
      box-shadow: 0 0 14px rgba(155,147,199,0.16);
    }
    .exp-meta { text-align: right; padding-top: 2px; }
    .exp-year { font-size: 0.73rem; color: var(--muted); line-height: 1.6; white-space: nowrap; }
    .exp-avatar {
      width: 58px; height: 58px; border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 18%, var(--s2)), var(--s2));
      border: 1px solid color-mix(in srgb, var(--accent) 34%, var(--border2));
      color: var(--accent3); font-family: var(--ffd); font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.6px; box-shadow: 0 0 0 5px var(--bg), 0 14px 30px rgba(0,0,0,0.22);
      position: relative; z-index: 1;
    }
    .exp-avatar img {
      width: 100%; height: 100%; display: block; object-fit: cover; object-position: center;
    }
    .exp-content {
      min-width: 0; padding-top: 1px;
    }
    .exp-company {
      font-size: 0.7rem; color: var(--accent); font-weight: 700;
      letter-spacing: 0.5px; margin-bottom: 4px; text-transform: uppercase;
    }
    .exp-title { font-weight: 600; font-size: 0.95rem; color: var(--text); margin-bottom: 6px; }
    .exp-bullets { list-style: none; }
    .exp-bullets li {
      font-size: 0.8rem; color: var(--muted); line-height: 1.54;
      padding-left: 14px; position: relative; margin-bottom: 6px;
    }
    .exp-bullets li::before {
      content: ''; position: absolute; left: 0; top: 9px;
      width: 5px; height: 1px; background: var(--accent); opacity: 0.6;
    }
    .exp-item[data-folder] { cursor: pointer; border-radius: 12px; transition: transform 0.24s cubic-bezier(.22,1,.36,1); }
    .exp-item[data-folder]:hover { transform: translateX(4px); }
    .exp-item[data-folder]:focus-visible { outline: 2px solid var(--accent); outline-offset: 8px; }

    /* -- SKILLS -- */
    #skills { background: var(--s1); }
    .skills-cats { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; max-width: 1080px; }
    .skill-cat {
      background: var(--s2); border: 1px solid var(--border); border-radius: 14px;
      padding: 22px; transition: all 0.3s; position: relative; overflow: hidden;
    }
    .skill-cat::after {
      content: ''; position: absolute; inset: 0; border-radius: 14px;
      background: radial-gradient(circle at 50% 0%, rgba(155,147,199,0.04), transparent 60%);
      pointer-events: none;
    }
    .skill-cat:hover { border-color: var(--border2); box-shadow: 0 0 24px rgba(155,147,199,0.05); }
    .skill-cat-head {
      display: flex; align-items: center; gap: 9px;
      font-weight: 600; font-size: 0.84rem; margin-bottom: 16px; color: var(--text);
    }
    .skill-cat-head svg { color: var(--accent); flex-shrink: 0; }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 7px; }
    .stk {
      font-size: 0.72rem; padding: 4px 11px; border-radius: 100px;
      background: var(--s3); border: 1px solid var(--border);
      color: var(--muted); transition: all 0.2s; cursor: default;
    }
    .stk:hover { border-color: var(--border2); color: var(--text2); }
    .stk.hi {
      background: rgba(155,147,199,0.07); border-color: rgba(155,147,199,0.22);
      color: var(--accent3);
    }

    /* -- PROJECTS -- */
    #projects { background: var(--bg); }
    .proj-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 40px; }
    .filter-btn {
      padding: 7px 16px; border-radius: 100px; font-size: 0.77rem; font-weight: 500;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.2s; font-family: var(--ff);
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: rgba(155,147,199,0.28); color: var(--accent);
      background: rgba(155,147,199,0.06); box-shadow: 0 0 10px rgba(155,147,199,0.08);
    }

    .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px,1fr)); gap: 20px; max-width: 1080px; }

    /* Project cards */
    .proj-card {
      background: var(--s1); border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; display: flex; flex-direction: column;
      will-change: transform;
      cursor: pointer;
      transition: transform 0.24s cubic-bezier(.22,1,.36,1), border-color 0.3s, box-shadow 0.3s;
    }
    .proj-card:hover { border-color: rgba(155,147,199,0.24); box-shadow: 0 18px 52px rgba(0,0,0,0.46), 0 0 28px rgba(155,147,199,0.07); }
    .proj-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }

    /* -- SLIDER -- */
    .proj-slider { aspect-ratio: 16 / 9; height: auto; overflow: hidden; position: relative; flex-shrink: 0; background: var(--media-bg); }
    .slider-track { display: flex; height: 100%; transition: transform 0.42s cubic-bezier(.22,1,.36,1); will-change: transform; }
    .slide { min-width: 100%; height: 100%; flex-shrink: 0; position: relative; overflow: hidden; }
    .slide svg { width: 100%; height: 100%; display: block; }
    .slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .slide video, .slide iframe { width: 100%; height: 100%; display: block; border: 0; object-fit: cover; }
    .proj-img { aspect-ratio: 16 / 9; height: auto; overflow: hidden; position: relative; flex-shrink: 0; background: var(--media-bg); }
    .proj-cover { width: 100%; height: 100%; object-fit: cover; display: block; }
    .proj-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 12%, var(--media-bg)), var(--media-bg2)); color: var(--text2); font-family: var(--ffd); font-weight: 700; text-align: center; }
    .slider-btn {
      position: absolute; top: 50%; transform: translateY(-50%); z-index: 20;
      width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(155,147,199,0.24);
      background: color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter: blur(6px);
      color: var(--accent3); cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; opacity: 0; font-size: 14px; line-height: 1;
    }
    .proj-slider:hover .slider-btn { opacity: 1; }
    .slider-btn:hover { background: rgba(155,147,199,0.12); border-color: var(--accent); }
    .slider-btn.prev { left: 8px; }
    .slider-btn.next { right: 8px; }
    .slider-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 20; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(155,147,199,0.24); cursor: pointer; transition: all 0.2s; }
    .dot.active { background: var(--accent); width: 14px; border-radius: 3px; }
    .slide-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 6px 12px; font-size: 0.68rem; color: rgba(184,177,214,0.7);
      background: linear-gradient(0deg, color-mix(in srgb, var(--bg) 88%, transparent), transparent);

    .project-modal-content { min-width: 0; overflow-y: auto; padding: 42px 34px 34px; }

    .project-detail-block { margin-bottom: 18px; }

    .project-detail-block p, .project-detail-block li {

    /* -- CONTACT -- */
    #contact { background: var(--s1); }
    .contact-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 42px; max-width: 1080px; margin-bottom: 52px;

    .contact-head-copy { min-width: 0; }

    .contact-portrait {
      width: clamp(132px, 13vw, 190px); height: clamp(132px, 13vw, 190px);

      box-shadow: 0 20px 54px var(--shadow-soft), 0 0 0 8px color-mix(in srgb, var(--accent) 7%, transparent);

    .contact-grid { display: block; max-width: 1080px; }

    .clink:hover { border-color: rgba(155,147,199,0.24); box-shadow: 0 0 18px rgba(155,147,199,0.05); transform: translateX(4px); }
    .clink-icon {

      margin-top: 18px; padding: 20px 22px;

    /* -- INTRO VIDEO POPUP -- */
    .intro-video-widget {
      position: fixed; right: 28px; bottom: 28px; z-index: 240;
      width: min(360px, calc(100vw - 36px));
      pointer-events: none; opacity: 0;
      transform: translateY(28px) scale(0.96);
      transition: transform 0.48s cubic-bezier(.16,1,.3,1), opacity 0.34s ease;
    }
    .intro-video-widget.is-visible {
      pointer-events: auto; opacity: 1;
      transform: translateY(0) scale(1);
    }
    .intro-video-widget.is-closed {
      pointer-events: none; opacity: 0;
      transform: translateX(34px) translateY(12px) scale(0.94);
    }
    .intro-video-panel {
      position: relative; overflow: visible;
      border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--border2));
      border-radius: 16px; background: var(--s2);

    }
    .intro-video-panel::after {
      content: ''; position: absolute; inset: auto 0 0; height: 38%;
      border-radius: 0 0 16px 16px; pointer-events: none;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.38));
    }
    .intro-video-panel video {
      display: block; width: 100%; aspect-ratio: 16 / 9; object-fit: cover;
      border-radius: 15px; background: var(--media-bg);
    }
    .intro-video-close {
      position: absolute; top: -14px; right: -14px; z-index: 4;
      width: 36px; height: 36px; border-radius: 50%;

      color: var(--text); backdrop-filter: blur(12px);
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 12px 30px rgba(0,0,0,0.32);

    }
    .intro-video-close:hover {
      transform: scale(1.06); border-color: var(--accent3);
      background: color-mix(in srgb, var(--accent3) 20%, var(--s2));
    }
    .intro-video-toggle,
    .intro-video-sound {
      position: absolute; left: 14px; bottom: 14px; z-index: 3;
      width: 48px; height: 48px; border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--accent3) 48%, rgba(255,255,255,0.2));
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      color: var(--button-fg); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 28px rgba(0,0,0,0.34);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }
    .intro-video-sound {
      left: 74px; width: 42px; height: 42px;
      background: color-mix(in srgb, var(--bg) 58%, transparent);
      color: var(--text); backdrop-filter: blur(10px);
    }
    .intro-video-toggle:hover,
    .intro-video-sound:hover {
      transform: translateY(-1px) scale(1.04);
      filter: brightness(1.04);
      box-shadow: 0 16px 34px rgba(0,0,0,0.38);
    }
    .intro-video-toggle svg,
    .intro-video-sound svg,
    .intro-video-tab svg,
    .intro-video-close svg { width: 18px; height: 18px; display: block; }
    .intro-video-tab {
      position: fixed; right: 0; bottom: 80px; z-index: 235;
      width: 70px; height: 64px; border-radius: 999px 0 0 999px;
      border: 1px solid color-mix(in srgb, var(--accent3) 38%, var(--border2)); border-right: 0;
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      color: var(--button-fg); cursor: pointer; backdrop-filter: blur(14px);
      display: none; align-items: center; justify-content: flex-end;
      gap: 0; padding: 0 24px 0 18px; overflow: hidden; white-space: nowrap;
      box-shadow: 0 18px 45px rgba(0,0,0,0.32);
      transition: width 0.42s cubic-bezier(.16,1,.3,1), gap 0.32s ease, transform 0.2s ease, filter 0.2s ease, background 0.2s ease;
      animation: introTabPulse 2.6s ease-in-out infinite;
    }
    .intro-video-tab.is-replay {
      background: color-mix(in srgb, var(--s2) 78%, transparent);
      color: var(--accent3);
      animation: introReplayPulse 3.2s ease-in-out infinite;
    }
    .intro-video-tab svg { flex: 0 0 18px; }
    .intro-video-tab .intro-replay-icon { display: none; }
    .intro-video-tab-label {
      max-width: 0; overflow: hidden; opacity: 0;
      transform: translateX(18px);
      font-family: var(--ffd); font-size: 0.84rem; font-weight: 600;
      letter-spacing: 0;
      transition: max-width 0.42s cubic-bezier(.16,1,.3,1), opacity 0.2s ease, transform 0.42s cubic-bezier(.16,1,.3,1);
    }
    .intro-video-tab:hover,
    .intro-video-tab:focus-visible {
      width: min(286px, calc(100vw - 16px)); gap: 12px;
      transform: translateX(0); filter: brightness(1.05);
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      color: var(--button-fg);
    }
    .intro-video-tab:hover .intro-video-tab-label,
    .intro-video-tab:focus-visible .intro-video-tab-label {
      max-width: 205px; opacity: 1; transform: translateX(0);
    }
    .intro-video-tab.is-replay:hover,
    .intro-video-tab.is-replay:focus-visible {
      width: 132px;
      background: color-mix(in srgb, var(--s2) 78%, transparent);
      color: var(--accent3);
    }
    .intro-video-tab.is-replay:hover .intro-video-tab-label,
    .intro-video-tab.is-replay:focus-visible .intro-video-tab-label {
      max-width: 54px;
    }
    .intro-video-tab.is-replay .intro-play-tab-icon { display: none; }
    .intro-video-tab.is-replay .intro-replay-icon { display: block; }
    .intro-video-tab.is-visible { display: inline-flex; }
    @keyframes introTabPulse {
      0%, 100% {
        box-shadow: 0 18px 45px rgba(0,0,0,0.32), 0 0 0 0 rgba(184,177,214,0.34), 0 0 0 0 rgba(127,138,180,0.18);
      }
      55% {

    @keyframes introReplayPulse {
      0%, 100% { box-shadow: 0 18px 45px rgba(0,0,0,0.32), 0 0 0 0 rgba(184,177,214,0.12); }

    .intro-video-close:focus-visible,
    .intro-video-toggle:focus-visible,
    .intro-video-sound:focus-visible,

    /* -- FOOTER -- */
    footer {
      padding: 28px 52px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;

    .footer-logo span { color: var(--accent); }

    /* -- FLOATING ORBS -- */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none;
      z-index: 0; opacity: 0.06; animation: drift 20s ease-in-out infinite;
    }
    .orb1 { width: 500px; height: 500px; background: var(--accent); top: -100px; right: -100px; animation-delay: 0s; }
    .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: 20%; left: -100px; animation-delay: -7s; }
    .orb3 { width: 300px; height: 300px; background: #6f86a8; top: 50%; right: 10%; animation-delay: -14s; }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px,-40px) scale(1.05); }
      66% { transform: translate(-20px,30px) scale(0.95); }
    }

    /* -- REVEAL ANIMATION -- */
    .reveal {
      opacity: 0; transform: translateY(28px);

    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    #projects .proj-card.visible:hover { transform: translateY(-4px) scale(1.018); }

    /* -- RESPONSIVE -- */
    @media(max-width:900px){
      nav { padding: 0 24px; }
      .nav-links { display: none; }
      section { padding: 72px 24px; }
      #hero { padding: 90px 24px 60px; }
      .hero-stats { gap: 28px; }
      .about-grid { grid-template-columns: 1fr; min-height: 0; }
      .about-side { min-height: 560px; grid-row: 2; }
      .about-portrait-stage { position: absolute; }
      .about-portrait-stage::before { background: linear-gradient(180deg, var(--s1) 0%, transparent 10%); }
      .about-body { grid-row: 1; padding: 64px 24px 56px; }
      .about-body .stag { margin-bottom: 46px; }
      .about-body .sh { font-size: clamp(2.2rem, 8vw, 3.4rem); }
      .role-cards { margin-top: 28px; }
      .skills-cats { grid-template-columns: 1fr 1fr; }
      .contact-head { gap: 24px; }
      .contact-portrait { width: 128px; height: 128px; margin-top: 16px; }
      .contact-links-list { grid-template-columns: 1fr; }
      .intro-video-widget { right: 18px; bottom: 18px; width: min(320px, calc(100vw - 32px)); }
      .intro-video-tab { bottom: 64px; width: 74px; height: 68px; }
      .exp-item { grid-template-columns: 58px minmax(0,1fr); gap: 0 18px; --avatar-center: 29px; }
      .exp-item:not(:last-child)::after { top: 66px; bottom: -30px; }
      .exp-meta { grid-column: 2; text-align: left; margin-bottom: 4px; padding-top: 0; }
      .exp-avatar { grid-row: 1 / span 2; grid-column: 1; }
      .exp-content { grid-column: 2; }
      .project-modal { padding: 16px; align-items: flex-start; overflow-y: auto; }
      .project-modal-panel { grid-template-columns: 1fr; height: auto; max-height: none; }
      .project-modal-slider { min-height: 260px; height: 48vh; }
      .project-modal-content { padding: 30px 22px 24px; }
      footer { flex-direction: column; text-align: center; }
    }
    @media(max-width:600px){
      .about-side { min-height: 390px; }
      .about-body { padding-top: 48px; }
      .about-body .stag { margin-bottom: 36px; }
      .role-cards { grid-template-columns: 1fr; gap: 8px; padding-bottom: 8px; }
      .role-card { padding: 16px; }
      .role-card-head { margin-bottom: 4px; }
      .skills-cats { grid-template-columns: 1fr; }
      .proj-grid { grid-template-columns: 1fr; }
      .contact-head { align-items: center; gap: 18px; margin-bottom: 40px; }
      .contact-portrait { width: 92px; height: 92px; margin-top: 0; }
      .intro-video-widget { width: min(280px, calc(100vw - 28px)); right: 14px; bottom: 14px; }
      .intro-video-tab { width: 64px; height: 60px; bottom: 54px; }
      .project-modal { padding: 10px; }
      .project-modal-slider { height: 300px; min-height: 300px; }
    }
  </style>
</head>

<script>
/* -----------------------------------------
   THREE.JS HERO — floating violet particle network & 3D Lightbulb (Fully Elongated)
   ----------------------------------------- */
(function(){
  const canvas = document.getElementById('hero-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 1000);
  camera.position.z = 50;

  // Build the elongated 3D lightbulb group.
  const bulbGroup = new THREE.Group();

  const bulbMat = new THREE.MeshBasicMaterial({ 
    color: 0xc4b5fd, 
    wireframe: true, 
    transparent: true, 
    opacity: 0.08 
  });

  // Top bulb dome.
  const bulbTopGeo = new THREE.SphereGeometry(7.5, 12, 8, 0, Math.PI * 2, 0, Math.PI * 0.5);
  const bulbTop = new THREE.Mesh(bulbTopGeo, bulbMat);
  bulbTop.position.y = 8.5; 
  bulbGroup.add(bulbTop);

  // Lower bulb body.
  const bulbBodyGeo = new THREE.CylinderGeometry(7.5, 3.8, 12, 12, 5, true);
  const bulbBody = new THREE.Mesh(bulbBodyGeo, bulbMat);
  bulbBody.position.y = 2.5; 
  bulbGroup.add(bulbBody);

  // Narrow neck connector.
  const neckGeo = new THREE.CylinderGeometry(3.8, 3.2, 2, 12, 1, true);
  const neckMesh = new THREE.Mesh(neckGeo, bulbMat);
  neckMesh.position.y = -3.5;
  bulbGroup.add(neckMesh);

  // Thread rings.
  for (let i = 0; i < 3; i++) {
    const threadGeo = new THREE.TorusGeometry(2.9 - (i * 0.15), 0.5, 6, 12);
    const threadMesh = new THREE.Mesh(threadGeo, bulbMat);
    threadMesh.rotation.x = Math.PI / 2;
    threadMesh.position.y = -5.0 - (i * 1.0);
    bulbGroup.add(threadMesh);
  }

  // Bottom contact point.
  const bottomGeo = new THREE.CylinderGeometry(1.8, 0, 1.2, 12, 1);
  const bottomMesh = new THREE.Mesh(bottomGeo, bulbMat);
  bottomMesh.position.y = -7.5;
  bulbGroup.add(bottomMesh);

  // Inner filament.
  const filamentGroup = new THREE.Group();
  const fMat = new THREE.MeshBasicMaterial({ color: 0xc4b5fd, wireframe: true, transparent: true, opacity: 0.15 });
  
  const standGeo = new THREE.CylinderGeometry(0.1, 0.1, 8, 4); 
  const leftStand = new THREE.Mesh(standGeo, fMat);
  leftStand.position.set(-1.5, 3, 0);
  const rightStand = new THREE.Mesh(standGeo, fMat);
  rightStand.position.set(1.5, 3, 0);
  
  const topLoopGeo = new THREE.TorusGeometry(1.5, 0.15, 4, 8, Math.PI);
  const topLoop = new THREE.Mesh(topLoopGeo, fMat);
  topLoop.position.set(0, 7, 0); 
  
  filamentGroup.add(leftStand, rightStand, topLoop);
  bulbGroup.add(filamentGroup);

  // Position the hero object.
  bulbGroup.position.set(28, 0, -5);
  bulbGroup.scale.set(1.1, 1.1, 1.1);
  scene.add(bulbGroup);

  // Keep the lightbulb placement responsive.
  function resize(){
    const hero = document.getElementById('hero');
    const w = hero ? hero.offsetWidth : window.innerWidth;
    const h = hero ? hero.offsetHeight : window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();

    if (w < 768) {
      bulbGroup.position.set(0, -10, -5);
      bulbGroup.scale.set(0.8, 0.8, 0.8);
    } else if (w < 1024) {
      bulbGroup.position.set(20, -2, -5);
      bulbGroup.scale.set(0.95, 0.95, 0.95);
    } else {
      bulbGroup.position.set(28, 0, -5);
      bulbGroup.scale.set(1.1, 1.1, 1.1);
    }
  }
  resize();
  window.addEventListener('resize', resize);

  // Background particles.
  const COUNT = 72;
  const positions = new Float32Array(COUNT * 3);
  const vels = [];
  for(let i = 0; i < COUNT; i++){
    positions[i*3]   = (Math.random() - 0.5) * 120;
    positions[i*3+1] = (Math.random() - 0.5) * 80;
    positions[i*3+2] = (Math.random() - 0.5) * 40;
    vels.push({
      x: (Math.random() - 0.5) * 0.04,
      y: (Math.random() - 0.5) * 0.04,
      z: (Math.random() - 0.5) * 0.02
    });
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const pMat = new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.7, transparent: true, opacity: 0.75 });
  const points = new THREE.Points(pGeo, pMat);
  scene.add(points);

  // Lines Network
  const lineGeo = new THREE.BufferGeometry();
  const linePositions = new Float32Array(COUNT * COUNT * 6);
  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
  const lineMat = new THREE.LineSegments(
    lineGeo,
    new THREE.LineBasicMaterial({ color: 0x818cf8, transparent: true, opacity: 0.15 })
  );
  scene.add(lineMat);

  const cssColor = name => {
    const value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return value.startsWith('#') ? parseInt(value.slice(1), 16) : 0x9b93c7;
  };

  function updateHeroTheme(){
    bulbMat.color.setHex(cssColor('--accent3'));
    fMat.color.setHex(cssColor('--accent3'));
    pMat.color.setHex(cssColor('--accent'));
    lineMat.material.color.setHex(cssColor('--accent2'));
    pMat.opacity = currentTheme() === 'light' ? 0.48 : 0.75;
    lineMat.material.opacity = currentTheme() === 'light' ? 0.1 : 0.15;
  }
  updateHeroTheme();
  new MutationObserver(updateHeroTheme).observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['data-theme']
  });

  // Mouse parallax
  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => {
    mx = (e.clientX / window.innerWidth - 0.5) * 2;
    my = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  const heroSection = document.getElementById('hero');
  let heroActive = false;
  const updateHeroActive = () => {
    if(document.hidden){
      heroActive = false;
      return;
    }
    if(!heroSection){
      heroActive = true;
      return;
    }
    const rect = heroSection.getBoundingClientRect();
    heroActive = rect.bottom > -160 && rect.top < window.innerHeight + 160;
  };
  if('IntersectionObserver' in window && heroSection){
    new IntersectionObserver(entries => {
      heroActive = entries.some(entry => entry.isIntersecting) && !document.hidden;
    }, { rootMargin: '160px 0px' }).observe(heroSection);
  } else {
    updateHeroActive();
    window.addEventListener('scroll', updateHeroActive, { passive: true });
  }
  document.addEventListener('visibilitychange', updateHeroActive);

  let frame = 0;
  function animate(){
    requestAnimationFrame(animate);
    if(!heroActive) return;
    const t = Date.now() * 0.001;

    // Move particles
    const pos = pGeo.attributes.position.array;
    for(let i = 0; i < COUNT; i++){
      pos[i*3]   += vels[i].x;
      pos[i*3+1] += vels[i].y;
      pos[i*3+2] += vels[i].z;
      if(Math.abs(pos[i*3])   > 60) vels[i].x *= -1;
      if(Math.abs(pos[i*3+1]) > 40) vels[i].y *= -1;
      if(Math.abs(pos[i*3+2]) > 20) vels[i].z *= -1;
    }
    pGeo.attributes.position.needsUpdate = true;

    if(frame++ % 2 === 0){
      let lIdx = 0;
      const threshold = 22;
      for(let i = 0; i < COUNT; i++){
        for(let j = i+1; j < COUNT; j++){
          const dx = pos[i*3]-pos[j*3], dy = pos[i*3+1]-pos[j*3+1], dz = pos[i*3+2]-pos[j*3+2];
          const dist = Math.sqrt(dx*dx+dy*dy+dz*dz);
          if(dist < threshold && lIdx < linePositions.length - 6){
            linePositions[lIdx++] = pos[i*3]; linePositions[lIdx++] = pos[i*3+1]; linePositions[lIdx++] = pos[i*3+2];
            linePositions[lIdx++] = pos[j*3]; linePositions[lIdx++] = pos[j*3+1]; linePositions[lIdx++] = pos[j*3+2];
          }
        }
      }
      for(; lIdx < linePositions.length; lIdx++) linePositions[lIdx] = 0;
      lineGeo.attributes.position.needsUpdate = true;
    }

    // Gentle bulb rotation.
    if (bulbGroup) {
      bulbGroup.rotation.y = t * 0.22; 
      bulbGroup.rotation.x = Math.sin(t * 0.05) * 0.08; 
      bulbGroup.rotation.z = Math.cos(t * 0.03) * 0.05; 
    }

    // Camera parallax
    camera.position.x += (mx * 8 - camera.position.x) * 0.04;
    camera.position.y += (-my * 5 - camera.position.y) * 0.04;
    camera.lookAt(scene.position);

    renderer.render(scene, camera);
  }
  animate();
})();

function htmlEscape(value){
  return String(value ?? '').replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}

function freshAssetUrl(src){
  if(!src || /^(https?:|data:|blob:|#)/i.test(src)) return src || '';
  const url = encodeURI(String(src));
  return `${url}${url.includes('?') ? '&' : '?'}v=${Date.now()}`;
}

function loadPortfolioData(){
  try {
    const req = new XMLHttpRequest();
    req.open('GET', `portfolio-data.json?v=${Date.now()}`, false);
    req.send(null);
    if(req.status >= 200 && req.status < 300) return JSON.parse(req.responseText);
  } catch(error){
    console.error('Could not load portfolio-data.json', error);
  }
  return {};
}

function logoHtml(value = 'proud.'){
  const clean = htmlEscape(value);
  return clean.endsWith('.') ? `${clean.slice(0, -1)}<span>.</span>` : clean;
}

function initialsFromText(value = ''){
  const words = String(value).replace(/[()]/g, ' ').split(/\s+/).filter(Boolean);
  const letters = words
    .filter(word => !/^(co|ltd|club|and|the)$/i.test(word))
    .slice(0, 2)
    .map(word => word[0]?.toUpperCase() || '')
    .join('');
  return letters || 'PR';
}

function formatDateRange(value = ''){
  const clean = String(value).replace(/\s+/g, ' ').trim();
  if(!clean) return '';
  if(/\s(?:-|–|—|to)\s/i.test(clean)) return clean.replace(/\s(?:-|–|—|to)\s/i, ' - ');
  return clean.replace(/^([A-Za-z]{3,9}\s+\d{4})\s+(.+)$/, '$1 - $2');
}

function scrollToSection(targetId){
  const id = String(targetId || '').replace(/^#/, '');
  const target = document.getElementById(id);
  if(!target) return false;
  const navOffset = (document.getElementById('navbar')?.offsetHeight || 0) + 18;
  const top = target.getBoundingClientRect().top + window.scrollY - navOffset;
  window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
  try { history.replaceState(null, '', `#${id}`); } catch(e) {}
  return true;
}

function bindInternalScrollLinks(root = document){
  root.querySelectorAll('a[href^="#"]').forEach(link => {
    if(link.dataset.scrollBound === 'true') return;
    link.dataset.scrollBound = 'true';
    link.addEventListener('click', e => {
      if(scrollToSection(link.getAttribute('href'))) e.preventDefault();
    });
  });
}

  const tab = document.createElement('button');
  tab.className = 'intro-video-tab';
  tab.type = 'button';
  tab.setAttribute('aria-label', 'Open intro video');
  tab.innerHTML = `
    <svg class="intro-play-tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <svg class="intro-replay-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
    <span class="intro-video-tab-label">Let Me Introduce Myself ;)</span>`;

  document.body.append(wrap, tab);

  const video = wrap.querySelector('.intro-video');
  const toggle = wrap.querySelector('.intro-video-toggle');
  const soundToggle = wrap.querySelector('.intro-video-sound');
  const playIcon = wrap.querySelector('.intro-play-icon');
  const pauseIcon = wrap.querySelector('.intro-pause-icon');
  const mutedIcon = wrap.querySelector('.intro-muted-icon');
  const soundIcon = wrap.querySelector('.intro-sound-icon');
  const tabLabel = tab.querySelector('.intro-video-tab-label');
  let finishTimer = null;
  let hasCompleted = false;

  const syncButton = () => {
    const playing = !video.paused && !video.ended;
    playIcon.style.display = playing ? 'none' : '';
    pauseIcon.style.display = playing ? '' : 'none';
    toggle.setAttribute('aria-label', playing ? 'Pause intro video' : 'Play intro video');
  };
  const syncSoundButton = () => {
    const muted = video.muted || video.volume === 0;
    mutedIcon.style.display = muted ? '' : 'none';
    soundIcon.style.display = muted ? 'none' : '';
    soundToggle.setAttribute('aria-label', muted ? 'Turn intro video sound on' : 'Mute intro video');
  };

  const playVideo = (options = {}) => {
    if(options.muted !== undefined) video.muted = options.muted;
    video.volume = 1;
    return video.play().catch(() => {}).finally(() => {
      syncButton();
      syncSoundButton();
    });
  };
  const pauseVideo = () => {
    video.pause();
    syncButton();
  };
  const closeWidget = (replay = false) => {
    wrap.classList.remove('is-visible');
    wrap.classList.add('is-closed');
    tab.classList.toggle('is-replay', replay);
    tabLabel.textContent = replay ? 'Replay' : 'Let Me Introduce Myself ;)';
    tab.setAttribute('aria-label', replay ? 'Replay intro video' : 'Open intro video');
    tab.classList.add('is-visible');
  };
  const openWidget = (shouldPlay = true, options = {}) => {
    if(finishTimer){
      clearTimeout(finishTimer);
      finishTimer = null;
    }
    wrap.classList.remove('is-closed');
    tab.classList.remove('is-visible');
    requestAnimationFrame(() => wrap.classList.add('is-visible'));
    if(shouldPlay) playVideo(options);
  };

  toggle.addEventListener('click', () => {
    if(video.paused || video.ended) playVideo();
    else pauseVideo();
  });
  video.addEventListener('click', () => {
    if(video.paused || video.ended) playVideo();
    else pauseVideo();
  });
  video.addEventListener('play', syncButton);
  video.addEventListener('pause', syncButton);
  video.addEventListener('ended', () => {
    syncButton();
    hasCompleted = true;
    finishTimer = setTimeout(() => {
      closeWidget(true);
      finishTimer = null;
    }, 1500);
  });
  video.addEventListener('volumechange', syncSoundButton);
  soundToggle.addEventListener('click', () => {
    video.muted = !video.muted;
    syncSoundButton();
    if(video.paused || video.ended) playVideo();
  });

  wrap.querySelector('.intro-video-close').addEventListener('click', () => {
    if(finishTimer){
      clearTimeout(finishTimer);
      finishTimer = null;
    }
    pauseVideo();
    closeWidget(hasCompleted);
  });

  tab.addEventListener('click', () => {
    if(tab.classList.contains('is-replay')) video.currentTime = 0;
    openWidget(true, { muted: false });
  });

  video.autoplay = false;
  video.muted = false;
  video.volume = 1;
  pauseVideo();
  syncSoundButton();
  closeWidget(false);
}

/* Project sliders */
function initSlider(slider){
  const track = slider.querySelector('.slider-track');
  if(!track) return;
  const slides = Array.from(track.children).filter(el => el.classList.contains('slide'));
  const prev = slider.querySelector('.slider-btn.prev');
  const next = slider.querySelector('.slider-btn.next');
  const dotsWrap = slider.querySelector('.slider-dots');
  if(!slides.length) return;
  slider.classList.toggle('single', slides.length <= 1);

  if(dotsWrap && dotsWrap.children.length !== slides.length){
    dotsWrap.innerHTML = slides.map((_, i) => `<span class="dot${i === 0 ? ' active' : ''}" data-slide="${i}"></span>`).join('');
  }
  const dots = dotsWrap ? Array.from(dotsWrap.querySelectorAll('.dot')) : [];
  let index = 0;

  const go = nextIndex => {
    index = (nextIndex + slides.length) % slides.length;
    track.style.transform = `translateX(-${index * 100}%)`;
    dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    slides.forEach((slide, i) => {
      slide.querySelectorAll('video').forEach(video => {
        if(i === index){
          video.play?.().catch(() => {});
        } else {
          video.pause();
        }
      });
    });
  };

  if(prev) prev.onclick = e => { e.stopPropagation(); go(index - 1); };
  if(next) next.onclick = e => { e.stopPropagation(); go(index + 1); };
  dots.forEach((dot, i) => {
    dot.onclick = e => { e.stopPropagation(); go(i); };
  });
  go(0);
}

const projectSlug = text => text.toLowerCase().replace(/&/g, 'and').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
const setText = (id, value) => { document.getElementById(id).textContent = value || ''; };
const PROJECT_FOLDER = portfolioData.projectFolders || {};
const ASSET_ROOTS = portfolioData.assetRoots || ['image', 'images'];
const MEDIA_FALLBACK = portfolioData.mediaFallback || { project: {}, work: {} };
const IMAGE_EXTS = ['jpg', 'jpeg', 'png', 'webp', 'gif', 'avif'];
const VIDEO_EXTS = ['mp4', 'webm', 'mov', 'm4v'];
const ASSET_VERSION = `v=${Date.now()}`;
const assetListCache = new Map();
const imageCheckCache = new Map();
const cacheBust = () => ASSET_VERSION;
const projectFolder = (slug, details = {}) => details.folder || PROJECT_FOLDER[slug] || slug;
const fileExt = name => (name.split('.').pop() || '').toLowerCase();
const isImageFile = name => IMAGE_EXTS.includes(fileExt(name));
const isVideoFile = name => VIDEO_EXTS.includes(fileExt(name));
const isCoverFile = name => {
  const lower = name.toLowerCase();
  return lower === 'cover.png' || /(^|[-_])cover\.(png|jpe?g|webp|avif)$/i.test(lower);
};
const encodePath = value => String(value).split('/').map(part => encodeURIComponent(part)).join('/');
const assetUrl = (kind, folder, name, root = ASSET_ROOTS[0], bust = true) =>
  `${root}/${kind}/${encodePath(folder)}/${encodeURIComponent(name)}${bust ? `?${cacheBust()}` : ''}`;

function youtubeEmbedUrl(url){
  if(!url) return '';
  let id = '';
  try {
    const parsed = new URL(url, window.location.href);
    if(parsed.hostname.includes('youtu.be')) id = parsed.pathname.split('/').filter(Boolean)[0] || '';
    if(parsed.hostname.includes('youtube.com')){
      if(parsed.pathname.startsWith('/embed/')) id = parsed.pathname.split('/').filter(Boolean)[1] || '';
      if(parsed.pathname.startsWith('/shorts/')) id = parsed.pathname.split('/').filter(Boolean)[1] || '';
      if(!id) id = parsed.searchParams.get('v') || '';
    }
  } catch(e){
    id = url;
  }
  if(!id) return url;
  const params = new URLSearchParams({
    autoplay: '1',
    mute: '1',
    playsinline: '1',
    controls: '1',
    rel: '0',
    modestbranding: '1'
  });
  if(window.location.protocol === 'http:' || window.location.protocol === 'https:'){
    params.set('origin', window.location.origin);
  }
  return `https://www.youtube.com/embed/${id}?${params.toString()}`;
}

async function listManifestFiles(kind, folder, root){
  try {
    const res = await fetch(`${root}/${kind}/${encodePath(folder)}/manifest.json?${cacheBust()}`);
    if(!res.ok) return [];
    const data = await res.json();
    const files = Array.isArray(data) ? data : data.files;
    return Array.isArray(files) ? files.filter(name => typeof name === 'string') : [];
  } catch(e){
    return [];
  }
}

async function listDirectoryFiles(kind, folder, root){
  try {
    const res = await fetch(`${root}/${kind}/${encodePath(folder)}/?${cacheBust()}`);
    if(!res.ok) return [];
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const base = new URL(`${root}/${kind}/${encodePath(folder)}/`, window.location.href);
    return Array.from(doc.querySelectorAll('a'))
      .map(link => {
        try {
          const url = new URL(link.getAttribute('href'), base);
          const name = decodeURIComponent(url.pathname.split('/').filter(Boolean).pop() || '');
          return name && !name.endsWith('/') ? name : '';
        } catch(e){
          return '';
        }
      })
      .filter(Boolean)
      .filter((name, index, arr) => arr.indexOf(name) === index)
      .filter(name => isImageFile(name) || isVideoFile(name))
      .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
  } catch(e){
    return [];
  }
}

async function listAssetFiles(kind, folder){
  const key = `${kind}:${folder}`;
  if(assetListCache.has(key)) return assetListCache.get(key);

  const request = (async () => {
    for(const root of ASSET_ROOTS){
      const directoryFiles = await listDirectoryFiles(kind, folder, root);
      const files = directoryFiles.length ? directoryFiles : await listManifestFiles(kind, folder, root);
      const mediaFiles = files
        .filter(name => isImageFile(name) || isVideoFile(name))
        .filter((name, index, arr) => arr.indexOf(name) === index)
        .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
      if(mediaFiles.length) return { root, files: mediaFiles };
    }
    const fallbackFiles = MEDIA_FALLBACK[kind]?.[folder] || [];
    if(fallbackFiles.length) return { root: 'images', files: fallbackFiles };
    return { root: ASSET_ROOTS[0], files: [] };
  })();

  assetListCache.set(key, request);
  return request;
}

function buildFolderMedia(kind, folder, root, files){
  const detailFiles = files.filter(name => !isCoverFile(name));
  return detailFiles.map(name => ({
    type: isVideoFile(name) ? 'video' : 'image',
    src: assetUrl(kind, folder, name, root),
    caption: name.replace(/\.[^.]+$/, '').replace(/[-_]+/g, ' ')
  }));
}

async function getProjectMedia(slug, details, card){
  const media = [];
  const cardYoutube = Array.from(card.querySelectorAll('a[href]'))
    .map(link => link.href)
    .find(href => /youtu\.be|youtube\.com/i.test(href));
  const youtube = details.youtube || cardYoutube;
  if(youtube){
    media.push({ type: 'youtube', src: youtubeEmbedUrl(youtube), caption: 'Demo video' });
  }

  const folder = projectFolder(slug, details);
  const { root, files } = await listAssetFiles('project', folder);
  const folderMedia = buildFolderMedia('project', folder, root, files);
  media.push(...folderMedia);

  if(!folderMedia.length && details.media?.length){
    media.push(...details.media);
  }

  const slides = media.map(mediaSlide);
  if(!folderMedia.length && !details.media?.length){
    slides.push(...fallbackSlides(card));
  }
  return slides.length ? slides : fallbackSlides(card);
}

async function getWorkMedia(folder){
  const { root, files } = await listAssetFiles('work', folder);
  return buildFolderMedia('work', folder, root, files).map(mediaSlide);
}

function imageExists(src){

  const request = new Promise(resolve => {
    const img = new Image();

    img.onerror = () => resolve(false);
    img.src = src;
  });
  imageCheckCache.set(src, request);
  return request;
}

function mediaSlide(media){
  const slide = document.createElement('div');
  slide.className = 'slide';
  if(media.type === 'youtube'){
    const iframe = document.createElement('iframe');
    const embed = youtubeEmbedUrl(media.src);
    iframe.dataset.src = embed;
    iframe.src = iframe.dataset.src;
    iframe.title = media.caption || 'Project demo video';
    iframe.loading = 'eager';
    iframe.referrerPolicy = 'strict-origin-when-cross-origin';
    iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
    iframe.setAttribute('frameborder', '0');
    iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture; web-share';
    iframe.allowFullscreen = true;
    slide.appendChild(iframe);
  } else if(media.type === 'video'){
    const video = document.createElement('video');
    video.src = media.src;
    video.controls = true;
    video.muted = true;
    video.autoplay = true;
    video.playsInline = true;
    video.preload = 'metadata';
    slide.appendChild(video);
  } else {
    const img = document.createElement('img');
    img.src = media.src;
    img.alt = media.caption || 'Project image';
    img.loading = 'lazy';
    slide.appendChild(img);
  }
  if(media.caption){
    const caption = document.createElement('div');
    caption.className = 'slide-caption';
    caption.textContent = media.caption;
    slide.appendChild(caption);
  }
  return slide;
}

function fallbackSlides(card){
  if(card.__fallbackSlides?.length){
    return card.__fallbackSlides.map(slide => slide.cloneNode(true));
  }
  const slides = card.querySelectorAll('.proj-slider .slide');
  if(slides.length) return Array.from(slides).map(slide => slide.cloneNode(true));
  const image = card.querySelector('.proj-img');
  if(image){
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.innerHTML = image.innerHTML;
    return [slide];
  }
  return [];
}

  const challenges = details.challenges || ['Clarifying the core user problem, deciding what mattered most, and turning that into a focused deliverable.'];
  document.getElementById('project-modal-challenges').innerHTML = challenges.map(item => `<li>${escapeHtml(item)}</li>`).join('');
  document.getElementById('project-modal-tags').innerHTML = tech.map(item => `<span>${escapeHtml(item)}</span>`).join('');

  showModalLoading();

  const media = await getProjectMedia(slug, details, card);
  renderModalSlides(media);
}

function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, char => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}

async function openExperience(item){
  const company = item.querySelector('.exp-company')?.textContent.trim() || 'Experience';
  const title = item.querySelector('.exp-title')?.textContent.trim() || '';
  const year = formatDateRange(item.querySelector('.exp-year')?.textContent.trim() || '');
  const bullets = Array.from(item.querySelectorAll('.exp-bullets li')).map(li => li.textContent.trim()).filter(Boolean);
  const folder = item.dataset.folder || projectSlug(company);

  setModalLabels({
    about: 'About this work',
    experience: 'Role and scope',
    challenges: 'Highlights'
  });
  setText('project-modal-eyebrow', 'Experience');
  setText('project-modal-title', company);
  setText('project-modal-context', [title, year].filter(Boolean).join(' / '));
  setText('project-modal-about', title || company);
  setText('project-modal-experience', bullets[0] || 'A selected work experience from my portfolio.');
  document.getElementById('project-modal-challenges').innerHTML = (bullets.length > 1 ? bullets.slice(1) : bullets)
    .map(item => `<li>${escapeHtml(item)}</li>`)
    .join('');
  document.getElementById('project-modal-tags').innerHTML = '<span>Experience</span><span>Work</span>';

  showModalLoading();
  const media = await getWorkMedia(folder);
  renderModalSlides(media);
}

function closeProject(){
  projectModal.querySelectorAll('video').forEach(video => video.pause());
  projectModal.querySelectorAll('iframe').forEach(iframe => { iframe.src = 'about:blank'; });
  projectModal.classList.remove('open');
  projectModal.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('modal-open');
}

document.querySelectorAll('.proj-card').forEach(card => {
  card.tabIndex = 0;
  card.setAttribute('role', 'button');
  card.setAttribute('aria-label', `Open project details: ${card.querySelector('.proj-name')?.textContent.trim() || 'Project'}`);
  card.addEventListener('click', e => {
    if(e.target.closest('a, button, .slider-btn, .dot')) return;
    openProject(card);
  });
  card.addEventListener('keydown', e => {
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      openProject(card);
    }
  });
});
let projectCoversApplied = false;
function applyProjectCoversOnce(){
  if(projectCoversApplied) return;
  projectCoversApplied = true;
  applyProjectCovers();
}

const projectsSection = document.getElementById('projects');
if(projectsSection && 'IntersectionObserver' in window){
  const coverObserver = new IntersectionObserver(entries => {
    if(entries.some(entry => entry.isIntersecting)){
      applyProjectCoversOnce();
      coverObserver.disconnect();
    }
  }, { rootMargin: '600px 0px' });
  coverObserver.observe(projectsSection);
} else if('requestIdleCallback' in window){
  requestIdleCallback(applyProjectCoversOnce, { timeout: 1600 });
} else {
  setTimeout(applyProjectCoversOnce, 800);
}

const experienceSection = document.getElementById('experience');
if(experienceSection && 'IntersectionObserver' in window){
  const experienceImageObserver = new IntersectionObserver(entries => {
    if(entries.some(entry => entry.isIntersecting)){
      applyExperienceImages();
      experienceImageObserver.disconnect();
    }
  }, { rootMargin: '500px 0px' });
  experienceImageObserver.observe(experienceSection);
} else if('requestIdleCallback' in window){
  requestIdleCallback(applyExperienceImages, { timeout: 1400 });
} else {
  setTimeout(applyExperienceImages, 700);
}

document.querySelectorAll('.exp-item[data-folder]').forEach(item => {
  item.tabIndex = 0;
  item.setAttribute('role', 'button');
  item.setAttribute('aria-label', `Open work media: ${item.querySelector('.exp-company')?.textContent.trim() || 'Experience'}`);
  item.addEventListener('click', () => openExperience(item));
  item.addEventListener('keydown', e => {
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      openExperience(item);
    }
  });
});

modalClose.addEventListener('click', closeProject);
projectModal.addEventListener('click', e => {
  if(e.target === projectModal) closeProject();
});
document.addEventListener('keydown', e => {
  if(e.key === 'Escape' && projectModal.classList.contains('open')) closeProject();
});

function currentTheme(){
  return document.documentElement.dataset.theme === 'light' ? 'light' : 'dark';
}

function setTheme(theme){
  const nextTheme = theme === 'light' ? 'light' : 'dark';
  document.documentElement.dataset.theme = nextTheme;
  try { localStorage.setItem('portfolio-theme', nextTheme); } catch(e) {}

  const toggle = document.getElementById('theme-toggle');
  if(toggle){
    const label = nextTheme === 'light' ? 'Switch to dark theme' : 'Switch to light theme';
    toggle.setAttribute('aria-label', label);
    toggle.title = label;
  }
}

setTheme(currentTheme());
document.getElementById('theme-toggle')?.addEventListener('click', () => {
  setTheme(currentTheme() === 'light' ? 'dark' : 'light');
});

</script>
</body>
</html>
